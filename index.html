<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Document Upload</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p  { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
    input[type="text"], input[type="file"] {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 0.95rem; margin-bottom: 16px;
    }
    button {
      width: 100%; padding: 12px;
      background: #000; color: white;
      border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer;
    }
    button:disabled { background: #999; cursor: not-allowed; }
    .status {
      margin-top: 16px; padding: 12px;
      border-radius: 8px; font-size: 0.875rem;
      display: none;
    }
    .status.success { background: #e6f4ea; color: #1e7e34; display: block; }
    .status.error   { background: #fdecea; color: #c0392b; display: block; }
    .lock { font-size: 0.8rem; color: #888; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <h1>Secure Document Upload</h1>
  <p>Your document is encrypted in your browser before being sent.</p>

  <form id="uploadForm">
    <label for="refName">Client Name / Reference</label>
    <input type="text" id="refName" placeholder="John Doe - Loan Application" required />

    <label for="fileInput">PDF Document</label>
    <input type="file" id="fileInput" accept=".pdf" required />

    <button type="submit" id="submitBtn">Encrypt & Send</button>
  </form>

  <div class="status" id="statusMsg"></div>
  <p class="lock">End-to-end encrypted · AES-256-GCM + RSA-2048</p>
</div>

<script>
const PUBLIC_KEY_PEM = "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAqpnFZ/oBn0bqSaCNFX9d\ntQQFZJQJKJeIDV0Wx0544gywgHsxEJR4ewaQtmYNUi2Ifu9nFccvz7WawLFZv4/x\nsLGP1TA/xlzU/yYPOh6sVW1muYe9iek8/41OUL9wI+hXJbDBjZB2ZgMkKfKxD7AK\nZsC/hwMnAL6poPkAZM0oXiQZCF36DjqE6ypnAHPbdpYn4/hZkWwD6aSDbmvpfwLS\nQVaz4NClzjy2/lB5A8Qu+ea5p/RCd1jGeRVeYpXvQcAgYUVRnMD9kNUcwRphPfq2\nhzbCivjMVxiclATcyP6WjwrKDw5ePdIv7DEq0RIQbKOQWdHUBdz3iS2A2gMUws6Q\njQIDAQAB\n-----END PUBLIC KEY-----\n",;
const WEBHOOK_URL    = https://acquify-test-account.app.n8n.cloud/webhook/e9254919-3264-40c9-9470-b26be766f9e3;
const WEBHOOK_SECRET = Acquify2026;

function toBase64(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

async function importPublicKey(pem) {
  const b64 = pem.replace(/-----[^-]+-----/g, '').replace(/\s/g, '');
  const binary = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return crypto.subtle.importKey(
    'spki', binary.buffer,
    { name: 'RSA-OAEP', hash: 'SHA-256' },
    false, ['encrypt']
  );
}

async function encryptFile(file, publicKey) {
  const aesKey = await crypto.subtle.generateKey(
    { name: 'AES-GCM', length: 256 }, true, ['encrypt']
  );
  const iv           = crypto.getRandomValues(new Uint8Array(12));
  const fileBuffer   = await file.arrayBuffer();
  const encryptedFile = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, aesKey, fileBuffer);
  const rawAesKey    = await crypto.subtle.exportKey('raw', aesKey);
  const encryptedKey = await crypto.subtle.encrypt({ name: 'RSA-OAEP' }, publicKey, rawAesKey);

  return {
    encryptedFile: toBase64(encryptedFile),
    encryptedKey:  toBase64(encryptedKey),
    iv:            toBase64(iv),
    fileName:      file.name,
    mimeType:      file.type || 'application/pdf'
  };
}

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn    = document.getElementById('submitBtn');
  const status = document.getElementById('statusMsg');
  const file   = document.getElementById('fileInput').files[0];
  const ref    = document.getElementById('refName').value;

  btn.disabled     = true;
  btn.textContent  = 'Encrypting...';
  status.className = 'status';
  status.style.display = 'none';

  try {
    const pubKey  = await importPublicKey(PUBLIC_KEY_PEM);
    const payload = await encryptFile(file, pubKey);
    payload.reference = ref;

    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Webhook-Secret': WEBHOOK_SECRET
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error('Server error: ' + res.status);
    status.textContent = 'Document sent successfully.';
    status.className   = 'status success';
    e.target.reset();
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    status.className   = 'status error';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Encrypt & Send';
  }
});
</script>
</body>
</html>

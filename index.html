<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download MISMO 3.4 XML</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    .ref { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    .filename {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #333;
      margin-bottom: 24px;
      word-break: break-all;
    }
    button {
      width: 100%; padding: 12px;
      background: #000; color: white;
      border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer;
      margin-bottom: 12px;
    }
    button:hover { background: #222; }
    .back {
      display: block;
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      text-decoration: none;
      margin-top: 8px;
    }
    .back:hover { color: #333; }
    .error {
      color: #c00;
      font-size: 0.9rem;
      margin-top: 16px;
    }
    .lock { margin-top: 24px; color: #aaa; font-size: 0.78rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Conversion Complete</h1>
    <p class="ref" id="refText"></p>
    <div class="filename" id="fileNameDisplay"></div>
    <button id="downloadBtn">Download MISMO 3.4 XML</button>
    <a href="./index.html" class="back">← Convert another document</a>
    <p class="lock">End-to-end encrypted · AES-256-GCM + RSA-2048</p>
  </div>

<script>
  const xml      = sessionStorage.getItem('mismoXml');
  const fileName = sessionStorage.getItem('mismoFileName');
  const ref      = sessionStorage.getItem('mismoRef');

  if (!xml || !fileName) {
    document.querySelector('.icon').textContent = '⚠️';
    document.querySelector('h1').textContent = 'No document found';
    document.querySelector('.ref').textContent = 'Please go back and upload a document first.';
    document.querySelector('.filename').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';
  } else {
    document.getElementById('refText').textContent = ref || '';
    document.getElementById('fileNameDisplay').textContent = fileName;

    document.getElementById('downloadBtn').addEventListener('click', () => {
      const blob = new Blob([xml], { type: 'application/xml' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = fileName;
      a.click();
      URL.revokeObjectURL(url);

      // Limpiar sessionStorage después de descargar
      sessionStorage.removeItem('mismoXml');
      sessionStorage.removeItem('mismoFileName');
      sessionStorage.removeItem('mismoRef');
    });
  }
</script>
</body>
</html>
